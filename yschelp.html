<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
<title>易双六 — YSCHELP</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
:root {
  --sw: min(384px, 100vw);
  --sh: calc(var(--sw) * 0.75);        /* 上画面: 256x192 比率 */
  --lh: calc(var(--sw) * 0.68);        /* 下画面 */
  --cw: calc(var(--sw) / 32);          /* 1文字幅 = 12px */
  --board:  #10431f;
  --border: #1e6030;
  --con-bg: #e8e4d4;
  --text:   #1a1a0a;
  --link:   #005828;
  --link2:  #884400;
  --dim:    #888070;
  --sysbg:  #c8c4b4;
  --sysbdr: #908870;
}
* { box-sizing: border-box; margin: 0; padding: 0;
    -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body {
  min-height: 100vh;
  background: #000;
  font-family: 'Courier New', 'MS Gothic', monospace;
  overflow-x: hidden;
}
#game-wrapper {
  width: var(--sw);
  margin: 0 auto;
  transform-origin: top center;
  background: var(--board);
  display: flex; flex-direction: column; align-items: center;
}
#upper {
  width: var(--sw); height: var(--sh);
  background: #10431f;
  position: relative; overflow: hidden; flex-shrink: 0;
  border-bottom: 3px solid #0a1a10;
}
#cv-upper {
  position: absolute; top:0; left:0; width:100%; height:100%;
  image-rendering: pixelated; image-rendering: crisp-edges;
  touch-action: pinch-zoom;
}
#lower {
  width: var(--sw);
  height: var(--lh);
  background: var(--con-bg);
  display: flex; flex-direction: column;
  flex-shrink: 0;
  border-top: 3px solid #3a7050;
  position: relative;
  overflow: hidden;
}
#cv-lower {
  position: absolute; top:0; left:0;
  width: var(--sw); height: var(--sh);
  image-rendering: pixelated; image-rendering: crisp-edges;
  pointer-events: none; z-index: 0;
  touch-action: pinch-zoom;
}
#console {
  position: relative; z-index: 1;
  flex: 1; overflow-y: auto;
  padding: 2px 0 2px var(--cw);
  font-size: var(--cw);
  line-height: 1.0;
  color: var(--text);
  white-space: pre-wrap; word-break: break-all;
  /* 全角文字表示に適したフォント */
  font-family: 'Noto Sans JP', 'MS Gothic', 'Hiragino Kaku Gothic Pro', monospace;
  letter-spacing: 0;   /* 全角変換済みのため追加間隔不要 */
}
#console::-webkit-scrollbar { width: 3px; }
#console::-webkit-scrollbar-thumb { background: #a0a090; }
/* スーツ文字の色（プチコンCOL_S/D/H/C + JRFTAROT_CMAPの色）*/
.suit-s { color: #0000FF; }  /* ♠ 青 */
.suit-d { color: #D4AA00; }  /* ♦ 黄 */
.suit-h { color: #FF0000; }  /* ♥ 赤 */
.suit-c { color: #008000; }  /* ♣ 緑 */
.ilink {
  color: var(--link); cursor: pointer;
  text-decoration: none;
  font-family: inherit; font-size: inherit; line-height: inherit;
  letter-spacing: inherit;
  background: none; border: none; padding: 0; display: inline;
  white-space: pre-wrap;
}
.ilink:active { color: #002a10; }
.ilink-sys {
  color: var(--link2); cursor: pointer;
  text-decoration: none;
  font-family: inherit; font-size: inherit; line-height: inherit;
  letter-spacing: inherit;
  background: none; border: none; padding: 0; display: inline;
  white-space: pre-wrap;
}
.ilink-sys:active { color: #441800; }
#footer {
  width: var(--sw); height: 40px;
  background: #0c3018; flex-shrink: 0;
  display: flex; align-items: center; gap: 4px; padding: 0 6px;
  border-top: 2px solid var(--border);
}
.nbtn {
  flex: 1; height: 28px;
  font-family: inherit; font-size: 10px;
  background: var(--sysbg); border: 1px solid var(--sysbdr);
  cursor: pointer; color: var(--text); border-radius: 2px;
}
.nbtn:disabled { opacity: .25; cursor: default; }
.nbtn:not(:disabled):active { background: #a8c090; }
#bn-prev { color: #443388; }
#bn-back { color: #883333; }
#bn-next { color: #225522; font-weight: bold; }
#bgmbar {
  width: var(--sw); height: 14px; flex-shrink: 0;
  background: #0a2810;
  display: flex; align-items: center; padding: 0 8px; gap: 6px;
  border-bottom: 1px solid var(--border);
}
#bgmlabel { font-size: 8px; color: #50a060; letter-spacing: .1em; }
#credit { margin-left: auto; font-size: 8px; color: #307848; white-space: nowrap; }
#dialog {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.65); z-index: 100;
  align-items: center; justify-content: center;
}
#dialog.open { display: flex; }
#dlgbox {
  background: var(--con-bg); border: 2px solid var(--border);
  padding: 12px; width: min(300px, calc(var(--sw) - 20px));
  font-family: inherit;
}
#dlgtitle { font-size: 11px; color: #334422; margin-bottom: 8px; font-weight: bold; }
.slot {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 4px; border-bottom: 1px solid #c0bcac;
  cursor: pointer; font-size: 11px;
}
.slot:hover { background: rgba(0,88,40,.08); }
.slot-n { color: var(--dim); width: 20px; }
.slot-empty { color: var(--dim); font-style: italic; }
#dlgcancel {
  margin-top: 8px; width: 100%; font-family: inherit; font-size: 11px;
  padding: 5px; background: var(--sysbg); border: 1px solid var(--sysbdr); cursor: pointer;
}
/* スプラッシュ */
#splash {
  position: fixed; inset: 0; background: var(--board);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0; z-index: 200;
  overflow-y: auto;
  padding: 16px 0;
}
#splash-logo-img {
  /* 縦書き96x304 → 幅を絞って高さを制御 */
  width: min(72px, 18vw);
  image-rendering: pixelated;
  margin-bottom: 14px;
  /* 左右の透明余白をmarginで補正しない：画像自体に余白がないため中央揃え自然に効く */
  display: block;
}
#splash-yschelp {
  font-size: clamp(20px, 7vw, 32px);
  letter-spacing: .25em;
  color: #c8a832;
  font-family: 'Courier New', monospace;
  margin-bottom: 3px;
}
#splash-edition {
  font-size: clamp(10px, 3vw, 12px);
  color: #50a060;
  letter-spacing: .2em;
  margin-bottom: 12px;
}
#splash-credits {
  font-size: clamp(9px, 2.5vw, 11px);
  color: #307848;
  margin-bottom: 14px;
  text-align: center;
  line-height: 1.7;
}
/* 本編リンク用スペース（将来用） */
#splash-main-link {
  margin-bottom: 14px;
  min-height: 28px;
}
/* 言語選択ラジオ */
#splash-lang {
  display: flex; gap: 10px; margin-bottom: 14px;
}
.lang-radio { display: none; }
.lang-label {
  font-family: 'Courier New', monospace;
  font-size: clamp(11px, 3.5vw, 14px);
  padding: 7px 22px;
  border: 1px solid #506840;
  color: #506840;
  cursor: pointer;
  letter-spacing: .05em;
  border-radius: 2px;
  transition: all .15s;
}
.lang-radio:checked + .lang-label {
  border-color: #c8a832;
  color: #c8a832;
  background: rgba(200,168,50,.12);
}
#splash-start {
  font-family: 'Courier New', monospace;
  font-size: clamp(13px, 4vw, 17px);
  padding: 10px 44px;
  background: transparent;
  border: 2px solid #c8a832;
  color: #c8a832;
  cursor: pointer;
  letter-spacing: .15em;
  border-radius: 2px;
}
#splash-start:active { background: rgba(200,168,50,.2); }
#splash-err { font-size: 10px; color: #cc4444; display: none; text-align: center; margin-top: 8px; }
</style>
</head>
<body>
<div id="splash">
  <!-- 漢字ロゴ画像を中央に（縦書き96x304、余白なし金色） -->

<script>
'use strict';
// ============================================================
// 設定
// ============================================================
const SAVE_KEY   = 'yschelp_v5_';
const SAVE_SLOTS = 5;
const BGM_FILES = {
  21: 'maou_bgm_cyber29.mp3',
   2: 'maou_game_boss05.mp3',
   5: 'maou_game_event17.mp3',
   6: 'maou_bgm_orchestra19.mp3',
   9: 'maou_game_event37.mp3',    // コングラチュレーション
  10: 'maou_game_theme01.mp3',    // 穴に落ちて空へ
};
const BGM_NAMES = {21:'Dungeon',2:'Boss',5:'Goddess',6:'G.O.',9:'Congrats',10:'Fall→Sky'};
const N_MAP = {
  SQ:"'",DQ:'"',YEN:'¥',TILDA:'~',BACKSLASH:'\\',
  A:'Ⓐ',B:'Ⓑ',X:'Ⓧ',Y:'Ⓨ',L:'Ⓛ',R:'Ⓡ',
  CROSS:'✚',STAR:'★',NOTE:'♩',NOTE2:'♫',
  RIGHT:'→',LEFT:'←',UP:'↑',DOWN:'↓',
  BOX:'■',CIRCLE:'●',TRIANGLE:'▲',
  SPADE:'♠',DIA:'♦',HEART:'♥',CLUB:'♣',
};

// ============================================================
// 状態
// ============================================================
let DB       = null;
let flags    = new Set();
let history  = [];
let navLinks = {B:null, L:null, R:null};
let dlgMode  = null;
let audioOn  = false;
let bgmPlayer= null;
let bgmCur   = -1;
let currentLabel = '';

// ============================================================
// フラグ管理
// ============================================================
function setFlag(name, on) {
  if (on) flags.add(name);
  else flags.delete(name);
}

// G:FILENAME → そのPNGが事前ロード済みかチェック
const gFilePrechecked = {};
async function preloadForGCheck(files) {
  for (const f of files) {
    const src = f + '.png';
    const img = await loadImg(src);
    gFilePrechecked[src] = (img !== null);
  }
}

function evalFlag(spec) {
  if (spec.startsWith('G:')) {
    const src = spec.slice(2) + '.png';
    return gFilePrechecked[src] === true;
  }
  if (spec.startsWith('!')) return !flags.has(spec.slice(1));
  return flags.has(spec);
}

// ============================================================
// \P プロシージャ実装（yschlp.prgのロジック完全移植）
// ============================================================
// TST_TRAP(L$, PARAM$="p1,p2"):
//   r = RND(100)/100.0
//   r < p1             → "@TST_ROOM1T_XX" を返す（ジャンプ）
//   r < p1+p2          → "#" + TST_TRMSG_XX の先頭DATA（テキスト挿入）
//   otherwise          → "" （何もしない）
//   ※ \C[TR]\P[@TST_TRAP:...] なのでTR=trueのときだけ呼ばれる
//
// TST_RND(L$, PARAM$=N):
//   TMP_0..TMP_(N-1) からランダムに1つセット
//
// TST_CLEAR_TMP: TMP_で始まるフラグを全クリア

function readFirstDataRow(label) {
  if (!DB || !DB[label]) return '';
  const rows = DB[label];
  return (rows.length > 0 && typeof rows[0] === 'string') ? rows[0] : '';
}

function callProc(procSpec, currentLbl) {
  const colon = procSpec.indexOf(':');
  const procName = colon === -1 ? procSpec : procSpec.slice(0, colon);
  const param    = colon === -1 ? '' : procSpec.slice(colon + 1);

  if (procName === '@TST_RND') {
    const n = parseInt(param) || 2;
    const idx = Math.floor(Math.random() * n);
    for (let i = 0; i < n; i++) setFlag('TMP_' + i, i === idx);
    return '';
  }

  if (procName === '@TST_TRAP') {
    const parts = param.split(',').map(Number);
    const p1 = isNaN(parts[0]) ? 0.25 : parts[0];
    const p2 = isNaN(parts[1]) ? 0.25 : parts[1];
    const r = Math.floor(Math.random() * 100) / 100.0;
    // ラベル末尾2文字でEN/JAを判定
    const suffix = currentLbl.slice(-2);
    if (r < p1) {
      return '@TST_ROOM1T_' + suffix;
    } else if (r < p1 + p2) {
      const msg = readFirstDataRow('TST_TRMSG_' + suffix);
      // DATAは "\C[TR]..." のような実際のテキスト行か空文字
      // TST_TRMSG_ENの内容: "You found a trap, but escaped.\n\n"
      // これをそのまま文字列として返す（\nは改行コマンドとして処理される）
      return msg ? '#' + msg : '';
    }
    return '';
  }

  if (procName === '@TST_CLEAR_TMP') {
    for (const f of [...flags]) {
      if (f.startsWith('TMP_')) flags.delete(f);
    }
    return '';
  }

  return '';
}

// ============================================================
// Audio
// ============================================================
async function ensureAudio() {
  if (!audioOn) { await Tone.start(); audioOn = true; }
}
async function playBGM(n) {
  if (n === bgmCur) return;
  await ensureAudio();
  if (bgmPlayer) {
    try { bgmPlayer.stop(); bgmPlayer.dispose(); } catch(_) {}
    bgmPlayer = null;
  }
  bgmCur = n;
  document.getElementById('bgmlabel').textContent =
    n >= 0 ? `♪ ${BGM_NAMES[n] || n}` : '♪ —';
  if (n < 0 || !BGM_FILES[n]) return;
  bgmPlayer = new Tone.Player({
    url: BGM_FILES[n], loop: true, autostart: false,
    onload: () => { if (bgmCur === n) bgmPlayer.start(); },
    onerror: () => {}
  }).toDestination();
}
function stopBGM() { playBGM(-1); }

function clickSFX() {
  if (!audioOn) return;
  const t = Tone.now(), g = new Tone.Gain(.22).toDestination();
  const f = new Tone.Filter(1800, 'lowpass');
  f.frequency.setValueAtTime(1800, t);
  f.frequency.exponentialRampToValueAtTime(320, t+.09);
  const o = new Tone.Oscillator(950, 'sawtooth');
  const e = new Tone.AmplitudeEnvelope({attack:.001, decay:.08, sustain:0, release:.02});
  o.connect(f); f.connect(e); e.connect(g);
  o.start(t); o.stop(t+.15); e.triggerAttackRelease(.07, t);
  setTimeout(() => { try{o.dispose();f.dispose();e.dispose();g.dispose();}catch(_){} }, 400);
}

// ============================================================
// Canvas
// ============================================================
const cvU  = document.getElementById('cv-upper');
const ctxU = cvU.getContext('2d');
const cvL  = document.getElementById('cv-lower');
const ctxL = cvL.getContext('2d');

// 上画面: ロゴを描画してそのまま維持
// ページ遷移時は下画面だけクリア
// ただしページで \I[FILE,0,...] が来た場合は上画面の右半分を更新
function clearLower() {
  ctxL.clearRect(0, 0, 256, 192);
}

const imgCache = {};
function loadImg(src) {
  if (!imgCache[src]) {
    imgCache[src] = new Promise(res => {
      const img = new Image();
      img.onload  = () => res(img);
      img.onerror = () => { console.warn('Image not found:', src); res(null); }
      img.src = src;
    });
  }
  return imgCache[src];
}

// \I コマンド処理
// RN=8: \I[FILE,D,sx,sy,ex,ey,dx,dy]  D=0→上画面, D=1→下画面
// RN=7: \I[FILE,sx,sy,ex,ey,dx,dy]    下画面
// RN=2: \I[FILE,D]                     D=0→上, D=1→下 (全体コピー)
// RN=1: \I[FILE]                       下画面に全体コピー
async function processImage(arg) {
  const p = arg.split(',').map(s => s.trim());
  const rn = p.length;

  let file, D, sx, sy, ex, ey, dx, dy;

  if (rn === 1) {
    file = p[0]; D = 1;
  } else if (rn === 2) {
    file = p[0]; D = parseInt(p[1]);
  } else if (rn === 7) {
    [file, sx, sy, ex, ey, dx, dy] = p;
    D = 1;
    [sx, sy, ex, ey, dx, dy] = [sx, sy, ex, ey, dx, dy].map(Number);
  } else if (rn === 8) {
    [file, D, sx, sy, ex, ey, dx, dy] = p;
    D = parseInt(D);
    [sx, sy, ex, ey, dx, dy] = [sx, sy, ex, ey, dx, dy].map(Number);
  } else {
    console.warn('\\I: unsupported arg count', rn, arg);
    return;
  }

  const img = await loadImg(file + '.png');
  if (!img) {
    console.warn('\\I: image not loaded:', file);
    return;
  }

  const ctx = (D === 0) ? ctxU : ctxL;

  if (rn === 1 || rn === 2) {
    // 全体コピー
    ctx.drawImage(img, 0, 0, 256, 192, 0, 0, 256, 192);
  } else {
    // 指定領域コピー (GCOPY ... FALSE = 透明をスキップ)
    // HTMLCanvasではピクセル単位のスキップは重いのでdrawImageで代用
    // ただし透明(α=0)ピクセルは自然に透過される
    const sw = ex - sx + 1, sh = ey - sy + 1;
    ctx.drawImage(img, sx, sy, sw, sh, dx, dy, sw, sh);
  }
}

// 上画面ロゴ描画（縦書き、yschlp.prgの仕様通り）
// G_PUT_BM(X=32, Y=16+I*64, WHITE, "@CHAR_xxx", 0, 0)
// I=0: 易(Y=16), I=1: 双(Y=80), I=2: 六(Y=144)
// ロゴPNG(ysc_logo.png): W=64, H=176, 縦書き漢字
// カード表示領域: X=140以降を確保
async function drawLogo() {
  ctxU.fillStyle = '#10431f';
  ctxU.fillRect(0, 0, 256, 192);

  // 縦書き漢字ロゴ (左側 X=32〜64, Y=16〜176)
  const logo = await loadImg('ysc_logo.png');
  if (logo) {
    ctxU.imageSmoothingEnabled = false;
    ctxU.drawImage(logo, 0, 0, 64, 176, 0, 0, 64, 176);
  }

  // テキスト (X=72以降、yschlp.prgのCONSOLE座標に準拠)
  // LOGO_STR_JA$="ヨウスコウ" 縦に1文字ずつ (2行間隔=16px)
  ctxU.font = '10px monospace';
  ctxU.fillStyle = '#ffffff';
  ctxU.textAlign = 'left';
  const jaStr = 'ヨウスコウ';
  for (let i = 0; i < jaStr.length; i++) {
    ctxU.fillText(jaStr[i], 72, 24 + i * 18);
  }
  // LOGO_STR_EN$="Youscout"
  ctxU.font = '11px monospace';
  ctxU.fillStyle = '#e8e4c0';
  ctxU.fillText('Youscout', 72, 126);
  // LOGO_SUB_STR$
  ctxU.font = '9px monospace';
  ctxU.fillStyle = '#c8a832';
  ctxU.fillText('Tarot Solitaire', 72, 142);
  ctxU.fillStyle = '#50a060';
  ctxU.fillText('PTC  Web Edition', 72, 156);
  ctxU.textAlign = 'left';
}

// ============================================================
// エスケープパーサ
// ============================================================
const ESC_SET = new Set(['C','I','F','L','M','P','n','0']);

function skipEsc(s) {
  let i = 0;
  while (i < s.length) {
    if (s[i] === '\\' && i+1 < s.length) {
      if (ESC_SET.has(s[i+1])) break;
      i += 2;
    } else i++;
  }
  return { text: s.slice(0, i), rest: s.slice(i) };
}

function parseBracket(s) {
  if (!s || s[0] !== '[') return null;
  let d = 1, i = 1;
  while (i < s.length && d > 0) {
    if (s[i] === '[') d++; else if (s[i] === ']') d--;
    i++;
  }
  return d === 0 ? { arg: s.slice(1, i-1), rest: s.slice(i) } : null;
}

function resolveN(s) {
  return s.replace(/\\N\[([^\]]*)\]/g,
    (_, n) => N_MAP[n] !== undefined ? N_MAP[n] : `[${n}]`);
}

function parseLink(spec) {
  const nm = spec.match(/^([BLR]):(.*)/);
  if (nm) return { type:'nav', dir:nm[1], rest:nm[2] };
  if (spec === '@SAVE') return { type:'action', action:'save' };
  if (spec === '@LOAD') return { type:'action', action:'load' };
  if (spec === '@PREV') return { type:'action', action:'prev' };
  if (spec === '@' || spec === '') return { type:'action', action:'exit' };
  return { type:'goto', spec };
}

function evalSpec(spec) {
  if (!spec) return null;
  if (spec === '@PREV') return { label:'@PREV', setFlag:null };
  if (spec === '@')     return { label:'@',     setFlag:null };
  for (const part of spec.split(',')) {
    const m = part.match(/^([^@]*)@([A-Z][A-Z0-9_]*)(?::([A-Z0-9_]*))?$/);
    if (!m) continue;
    const [, cond, label, sf] = m;
    if (cond === '' || evalFlag(cond)) return { label, setFlag: sf || null };
  }
  return null;
}

// ============================================================
// ページレンダリング
// ============================================================
async function renderPage(label) {
  if (!DB || !DB[label]) { console.warn('No page:', label); return; }

  currentLabel = label;
  history.push(label);
  if (history.length > 100) history.shift();

  // 下画面クリア（上画面=ロゴは維持）
  clearLower();
  navLinks = {B:null, L:null, R:null};

  const conEl = document.getElementById('console');
  conEl.innerHTML = '';

  const imgTasks = [];
  // jumpLabel: \P[@TST_TRAP...]がジャンプを返した場合
  let jumpLabel = null;

  // 半角→全角変換（ASCII 0x21-0x7E → 全角、スペース→全角スペース）
  // スーツ記号・カタカナ・漢字などはそのまま
  function toFullWidth(s) {
    let r = '';
    for (const c of s) {
      const cp = c.codePointAt(0);
      if (cp === 0x20) r += '\u3000';        // 半角スペース→全角スペース
      else if (cp >= 0x21 && cp <= 0x7E) r += String.fromCodePoint(cp - 0x21 + 0xFF01);
      else r += c;
    }
    return r;
  }

  let textBuf = '';

  // スーツ文字を色付きspanに変換してDOMに追加（全角変換後）
  const SUIT_RE = /([♠♦♥♣])/g;
  const SUIT_CLASS = {'♠':'suit-s','♦':'suit-d','♥':'suit-h','♣':'suit-c'};
  function flushText() {
    if (!textBuf) return;
    const buf = toFullWidth(textBuf);
    SUIT_RE.lastIndex = 0;
    if (!SUIT_RE.test(buf)) {
      conEl.appendChild(document.createTextNode(buf));
    } else {
      SUIT_RE.lastIndex = 0;
      const parts = buf.split(SUIT_RE);
      for (const part of parts) {
        if (!part) continue;
        if (SUIT_CLASS[part]) {
          const sp = document.createElement('span');
          sp.className = SUIT_CLASS[part];
          sp.textContent = part;
          conEl.appendChild(sp);
        } else {
          conEl.appendChild(document.createTextNode(part));
        }
      }
    }
    SUIT_RE.lastIndex = 0;
    textBuf = '';
  }
  function addILink(txt, cls, handler) {
    if (!txt) return;
    flushText();
    const a = document.createElement('button');
    a.className = cls;
    a.textContent = toFullWidth(txt);
    a.onclick = () => { clickSFX(); handler(); };
    conEl.appendChild(a);
  }

  const rows = DB[label];

  outer:
  for (const rawRow of rows) {
    if (typeof rawRow !== 'string') continue;
    if (rawRow === '') break;
    if (jumpLabel) break; // \Pがジャンプを返した

    let S = resolveN(rawRow);

    while (S.length > 0) {
      if (jumpLabel) break;
      const { text, rest } = skipEsc(S);
      S = rest;
      if (text) textBuf += text;
      if (!S) break;

      const cmd = S[1];
      S = S.slice(2);

      if (cmd === 'n') { textBuf += '\n'; continue; }
      if (cmd === '0') { continue; }

      const br = parseBracket(S);
      if (!br) continue;
      const { arg, rest: afterBr } = br;
      S = afterBr;

      if (cmd === 'F') {
        if (arg.startsWith('!')) setFlag(arg.slice(1), false);
        else setFlag(arg, true);
        continue;
      }
      if (cmd === 'C') {
        // 偽なら行の残りを全消去（hlpview.prgの仕様通り）
        const cv = evalFlag(arg);
        if (arg === 'TR' || arg === 'K0') {
          console.log('[\\C]', arg, '=', cv, 'flags=', [...flags].join(','));
        }
        if (!cv) S = '';
        continue;
      }
      if (cmd === 'M') {
        if (arg === '@STOP') stopBGM();
        else { const n = parseInt(arg); if (!isNaN(n)) playBGM(n); }
        continue;
      }
      if (cmd === 'I') {
        imgTasks.push(processImage(arg));
        continue;
      }
      if (cmd === 'P') {
        // プロシージャ呼び出し
        const result = callProc(arg, label);
        console.log('[\\P]', arg, '→', JSON.stringify(result), 'TR=', flags.has('TR'));
        // "#TEXT" → テキストをエスケープ処理してから挿入（\nなどを処理）
        if (result && result.startsWith('#')) {
          S = resolveN(result.slice(1)) + S;
        }
        // "@LABEL[:FLAG]" → ジャンプ (現在のページ処理を中断)
        else if (result && result.startsWith('@')) {
          const inner = result.slice(1);
          const ci = inner.indexOf(':');
          const jl = ci === -1 ? inner : inner.slice(0, ci);
          const jf = ci === -1 ? null : inner.slice(ci+1);
          console.log('[\\P] jump to', jl, 'setFlag=', jf);
          if (jf) setFlag(jf, true);
          jumpLabel = jl;
        }
        continue;
      }

      if (cmd === 'L') {
        const lnk = parseLink(arg);
        const { text: lt, rest: afterLt } = skipEsc(S);
        S = afterLt;
        if (S.startsWith('\\0')) S = S.slice(2);
        const linkText = lt;

        if (lnk.type === 'nav') {
          navLinks[lnk.dir] = lnk.rest;
          continue;
        }
        if (lnk.type === 'action') {
          const act = lnk.action;
          if (act === 'save') {
            addILink(linkText || 'Save', 'ilink-sys', () => openDialog('save'));
            continue;
          }
          if (act === 'load') {
            addILink(linkText || 'Load', 'ilink-sys', () => openDialog('load'));
            continue;
          }
          if (act === 'prev') {
            if (linkText.trim()) addILink(linkText, 'ilink', doPrev);
            else navLinks['B'] = '@PREV';
            continue;
          }
          if (act === 'exit') {
            if (linkText.trim()) addILink(linkText, 'ilink', () => {});
            continue;
          }
        }
        if (lnk.type === 'goto') {
          if (!linkText) continue;
          const spec = lnk.spec;
          addILink(linkText, 'ilink', () => {
            const d = evalSpec(spec);
            if (d && d.label !== '@') {
              if (d.setFlag) setFlag(d.setFlag, true);
              renderPage(d.label);
            }
          });
        }
      }
    }
  }

  flushText();
  await Promise.all(imgTasks);

  // \Pからのジャンプ処理
  if (jumpLabel) {
    await renderPage(jumpLabel);
    return;
  }

  updateNav();
  conEl.scrollTop = 0;
}

// ============================================================
// ナビゲーション
// ============================================================
function updateNav() {
  document.getElementById('bn-prev').disabled = !navLinks.L;
  document.getElementById('bn-next').disabled = !navLinks.R;
  // BACKはnavLinks.Bが登録されているときのみ有効
  // ダンジョン中はK0=falseのため\C[K0]\L[B:...]が処理されずnavLinks.B=null
  document.getElementById('bn-back').disabled = !navLinks.B;
}

function doNav(dir) {
  clickSFX();
  if (dir === 'B') {
    const spec = navLinks.B;
    if (!spec) return;  // BACKが登録されていなければ何もしない
    if (spec === '@PREV' || spec === '') { doPrev(); return; }
    const d = evalSpec(spec);
    if (!d || d.label === '@') return;
    if (d.label === '@PREV') { doPrev(); return; }
    if (d.setFlag) setFlag(d.setFlag, true);
    history.pop();
    renderPage(d.label);
  } else {
    const spec = navLinks[dir];
    if (!spec) return;
    const d = evalSpec(spec);
    if (!d || d.label === '@') return;
    if (d.setFlag) setFlag(d.setFlag, true);
    history.pop();
    renderPage(d.label);
  }
}

function doPrev() {
  if (history.length > 1) {
    history.pop();
    renderPage(history.pop());
  }
}

// ============================================================
// Save / Load
// ============================================================
function openDialog(mode) {
  dlgMode = mode;
  document.getElementById('dlgtitle').textContent =
    mode === 'save' ? 'Which number do you save to?'
                    : 'Which number do you load from?';
  const sl = document.getElementById('dlgslots');
  sl.innerHTML = '';
  for (let i = 0; i < SAVE_SLOTS; i++) {
    let sv = null;
    try { const s = localStorage.getItem(SAVE_KEY + i); sv = s ? JSON.parse(s) : null; } catch(_) {}
    const row = document.createElement('div');
    row.className = 'slot';
    const info = sv
      ? `${sv.label}  (${new Date(sv.ts).toLocaleDateString('ja-JP')})`
      : ' — NEW —';
    row.innerHTML = `<span class="slot-n">${i+1}.</span>`
                  + `<span class="${sv ? '' : 'slot-empty'}">${info}</span>`;
    row.onclick = () => handleSlot(i, sv);
    sl.appendChild(row);
  }
  document.getElementById('dialog').classList.add('open');
}
function closeDialog() {
  document.getElementById('dialog').classList.remove('open');
  dlgMode = null;
}
function handleSlot(slot, existing) {
  if (dlgMode === 'save') {
    try {
      localStorage.setItem(SAVE_KEY + slot,
        JSON.stringify({
          label: currentLabel,
          flags: [...flags],
          ts: Date.now()
        }));
    } catch(_) {}
    closeDialog(); clickSFX();
  } else if (dlgMode === 'load' && existing) {
    flags.clear();
    (existing.flags || []).forEach(f => flags.add(f));
    // G:チェックはpreloadForGCheck済みなのでMKはフラグ評価に任せる
    // （セーブデータにMK/CMKが含まれていればそのまま使う）
    history = [];
    closeDialog(); clickSFX();
    renderPage(existing.label);
  } else closeDialog();
}

// ============================================================
// 起動
// ============================================================

// ゲーム領域を画面幅に合わせてスケール（iPad等の大画面対応）
function scaleGameWrapper() {
  const wrapper = document.getElementById('game-wrapper');
  const GAME_W = 384;
  const scaleW = window.innerWidth / GAME_W;
  const scaleH = window.innerHeight / 700;
  //const s = Math.max(1, Math.min(scaleW, scaleH));
  const s = Math.min(scaleW, scaleH);

  const actualWidth = GAME_W * s;
  wrapper.style.transform = `scale(${s})`;
  //wrapper.style.transformOrigin = 'top left';
  //wrapper.style.marginLeft = `calc((100vw - ${actualWidth}px) / 2)`;
  //wrapper.style.marginRight = '0';
  wrapper.style.transformOrigin = 'top center';
  wrapper.style.marginLeft = 'auto';
  wrapper.style.marginRight = 'auto';
}

// スプラッシュの「START」ボタン押下
function splashStart() {
  const sel = document.querySelector('input[name="lang"]:checked');
  if (!sel) {
    const err = document.getElementById('splash-err');
    err.textContent = '言語を選択してください / Please select language';
    err.style.display = 'block';
    return;
  }
  document.getElementById('splash-err').style.display = 'none';
  startApp(sel.value);
}

async function startApp(lang) {
  await ensureAudio();

  if (!DB) {
    let data;
    try {
      const r = await fetch('yschlp_data.json');
      if (!r.ok) throw new Error(r.status);
      data = await r.json();
    } catch(e) {
      const el = document.getElementById('splash-err');
      el.textContent = 'Error: yschlp_data.json を読み込めません';
      el.style.display = 'block';
      return;
    }
    DB = data;
  }

  document.getElementById('splash').style.display = 'none';
  scaleGameWrapper();
  window.addEventListener('resize', scaleGameWrapper);

  // G:FILENAME チェック用に画像を事前ロード
  await preloadForGCheck(['JRFTRT_A', 'JRFTRT_D', 'JRFTRT_S', 'JRFTRT_H', 'JRFTRT_C']);

  flags.clear();
  await drawLogo();

  history = [];
  await renderPage(lang === 'JA' ? 'HLP_START_JA' : 'HLP_START_EN');
}

// ?lang=en / ?lang=ja でデフォルト言語を設定
(function initLang() {
  const params = new URLSearchParams(location.search);
  const lang = (params.get('lang') || 'en').toUpperCase();
  const radio = document.getElementById(lang === 'JA' ? 'lang-ja' : 'lang-en');
  if (radio) radio.checked = true;
})();
